<style>
  @page { margin: 18mm 20mm; }
  html { font-size: 11.5pt; }
  body {
    font-family: 'Iowan Old Style', Palatino, 'Palatino Linotype', Georgia, 'Times New Roman', serif;
    line-height: 1.5; color: #1a1a1a;
    max-width: 44em; margin: 1.5em auto; padding: 0 1.2em;
  }
  h1 { font-size: 1.75em; line-height: 1.2; margin-bottom: .1em; }
  h2 { font-size: 1.3em; margin-top: 1.7em; border-bottom: 1px solid #ddd; padding-bottom: .15em; }
  h3 { font-size: 1.12em; margin-top: 1.3em; }
  p { margin: .6em 0; }
  code, pre { font-family: 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace; }
  code { font-size: .86em; background: #f0f0f0; padding: .08em .3em; border-radius: 3px; }
  pre { background: #f6f6f6; padding: .7em .9em; border-radius: 4px; overflow-x: auto; font-size: .82em; }

  table { border-collapse: collapse; margin: 1.1em 0; font-size: .95em; }
  th, td { border: 1px solid #c8c8c8; padding: .3em .65em; text-align: left; }
  th { background: #f3f3f3; }
  img { max-width: 84%; display: block; margin: 1.2em auto; }
  blockquote { border-left: 3px solid #ccc; margin: 1em 0; padding: .25em 1em; color: #3a3a3a; }
  a { color: #14507a; text-decoration: none; }
  sup { font-size: .72em; }
